schema-version = "1.11.0"

# Dev-shell packages only.  The BUILD of bubblewrap-jail is defined as a
# nix expression at .flox/pkgs/bubblewrap-jail.nix — its build inputs
# (pkg-config, libseccomp, shellcheck) come from the expression's function
# arguments, not from this [install] block.
#
# What's here exists so that `flox activate` gives an ergonomic interactive
# dev shell for:
#   - running the red-team test harness against either the built artifact
#     or the source tree (both bubblewrap and perl are used by tests)
#   - local shellcheck-before-build iteration on src/bubblewrap-jail
#   - validating `check --json` output structurally via jq
[install]
bashInteractive.pkg-path = "bashInteractive"
shellcheck.pkg-path      = "shellcheck"
jq.pkg-path              = "jq"
perl.pkg-path            = "perl"
bubblewrap.pkg-path      = "bubblewrap"
bubblewrap.systems       = ["x86_64-linux", "aarch64-linux"]

[options]
systems = ["x86_64-linux", "aarch64-linux"]
